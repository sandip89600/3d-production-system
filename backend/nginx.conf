# Upstream configuration for Node.js Backend cluster
upstream node_backend {
    server 127.0.0.1:5000;
    keepalive 32; # Keep-alive connections to backend nodes
}

# HTTP: Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name allindia3dstudio.deepitlabs.in www.allindia3dstudio.deepitlabs.in;

    # Certbot renewal path
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: Reverse Proxy and Frontend Static Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name allindia3dstudio.deepitlabs.in www.allindia3dstudio.deepitlabs.in;

    # SSL Certificates (Let's Encrypt paths)
    ssl_certificate /etc/letsencrypt/live/allindia3dstudio.deepitlabs.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/allindia3dstudio.deepitlabs.in/privkey.pem;

    # SSL Optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Cloudflare Integration: Parse Real Client IPs
    # Set real IP from Cloudflare proxies
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.27.0.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http: https: ws: wss:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Root directory for static React frontend files
    root /var/www/all3dstudio/frontend/dist;
    index index.html;

    # Serve static assets with long cache expirations
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Serve uploads folder directly via Nginx if STORAGE_PROVIDER is local
    location /uploads/ {
        alias /var/www/all3dstudio/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Reverse proxy API requests to Node.js Cluster
    location /api/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Pass headers for IP forwarding and Cloudflare compatibility
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $realip_remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Reverse proxy WebSockets (Socket.IO)
    location /socket.io/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        
        # Upgrade connection for WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $realip_remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Keepalive / timeout parameters for WebSockets
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Fallback to SPA routing for React frontend paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
